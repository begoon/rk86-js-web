<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    </head>
        <div style="font-family: monospace; width: 81ch; display: grid; grid-template-rows: auto 1fr">
            <div
                id="output"
                style="
                    height: 10em;
                    background-color: black;
                    color: lightgreen;
                    overflow-y: auto;
                    border: 1px solid #ccc;
                "
            ></div>
            <input type="text" id="input"/>
        </div>
        <br />
        <!-- !!! -->
        <div id="debug" style="display: grid; grid-template-columns: 1fr 10fr">
            <div>history</div>
            <div id="history"></div>
        </div>
        <!-- !!! -->
        <script type="module">
            const $ = (id) => document.getElementById(id);

            const history = [];
            const HISTORY_SIZE = 100;
            let historyIndex = 0;

            const output = $("output");

            function printHistory() {
                $("history").innerHTML = history
                    .toReversed()
                    .map((cmd, i) => {
                        const index = history.length - 1 - i;
                        return `<div style="${
                            historyIndex === index ? "color: green; outline: 1px solid green;" : ""
                        }"><b>[${index}]:</b> ${cmd}</div>`;
                    })
                    .join("");
            }

            const input = $("input");
            input.focus();

            function history(direction) {
                if (input.value.trim()) historyIndex += direction;

                if (historyIndex >= history.length) historyIndex = 0;
                if (historyIndex < 0) historyIndex = history.length - 1;
                input.value = history[historyIndex] || "";
                printHistory();
            }

            input.addEventListener("keydown", (event) => {
                switch (event.key) {
                    case "Escape": {
                        event.preventDefault();
                        input.value = "";
                        break;
                    }
                    case "Enter": {
                        event.preventDefault();

                        const cmd = input.value.trim().replace(/\n$/, "");
                        if (cmd === "") return;
                        input.value = "";

                        put(`RUN [${cmd}]\n`);

                        if (historyIndex === 0 && history[0] === cmd) return;

                        history.unshift(cmd);
                        if (history.length > HISTORY_SIZE) history.pop();
                        historyIndex = 0;

                        printHistory();
                        break;
                    }
                    case "ArrowUp": {
                        event.preventDefault();
                        history(1);
                        break;
                    }
                    case "ArrowDown": {
                        event.preventDefault();
                        history(-1);
                        break;
                    }
                }
            });
            function put(str) {
                output.innerHTML += "<div>" + str + "</div>";
                setTimeout(() => {
                    output.scrollTop = output.scrollHeight;
                }, 0);
            }
            history.unshift(...["ls -l", "cd /home/user", "echo 'Hello, World!'"]);
            printHistory();
        </script>
    </body>
</html>
