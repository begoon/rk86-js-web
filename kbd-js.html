<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    </head>

    <body bgcolor="#000000" text="#ffffff">
        <div id="keyboard_panel">
            <div class="keyboard">
                <style>
                    .keyboard {
                        display: flex;
                        gap: 1em;
                    }
                    .keyboard-row {
                        display: flex;
                        margin-left: 1em;
                    }
                    .keyboard button {
                        display: grid;
                        grid-row: repeat(3, 1fr);
                        background-color: #333;
                        color: #fff;
                        border: 1px solid #555;
                        cursor: pointer;
                        width: fit-content;
                        min-width: 2em;
                    }
                    .keyboard button div:last-child {
                        padding-top: 1em;
                    }
                    #keyboard-pad {
                        display: grid;
                        grid-template-columns: repeat(3, 1fr);
                    }
                    .keyboard-pad button {
                        width: 3em;
                        margin: 0;
                        padding: 0;
                    }
                </style>
                <div id="keyboard-main"></div>
                <div id="keyboard-pad"></div>
            </div>
        </div>
        <script type="module">
            import { main } from "./kbd-js.js";
            main();
        </script>
    </body>
</html>
