<html>

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
</head>

<body bgcolor="#000000" text="#ffffff" onload="onload()">
  <style>
    .keyboard {
      display: flex; 
      gap: 1em;
    }
    .keyboard-row {
      display: flex;
      margin-left: 1em;
    }
    .keyboard button {
      display: grid;
      grid-row: repeat(3, 1fr);
      background-color: #333;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
      width: fit-content;
      min-width: 2em;
    }
    .keyboard button div:last-child {
      padding-top: 1em;
    }
    .keyboard-pad {
      display: grid; 
      grid-template-columns: repeat(3, 1fr);
    }
    .keyboard-pad button {
      width: 3em;
      margin: 0;
      padding: 0;
    }
  </style>
  <div class="keyboard">
    <div>
      <div class="keyboard-row">
        <button><div>;</div><div>+</div><div>;</div></button>
        <button><div>1</div><div>!</div><div>1</div></button>
        <button><div>2</div><div>"</div><div>2</div></button>
        <button><div>3</div><div>#</div><div>3</div></button>
        <button><div>4</div><div>$</div><div>4</div></button>
        <button><div>5</div><div>%</div><div>5</div></button>
        <button><div>6</div><div>&</div><div>6</div></button>
        <button><div>7</div><div>'</div><div>7</div></button>
        <button><div>8</div><div>(</div><div>8</div></button>
        <button><div>9</div><div>)</div><div>9</div></button>
        <button><div>0</div><div>&nbsp;</div><div>0</div></button>
        <button><div>-</div><div>=</div><div>-</div></button>
        <button><div>TAB</div><div>&nbsp;</div><div>TAB</div></button>
        <button><div>ЗБ</div><div>&nbsp;</div><div>BS</div></button>
      </div>
      <div class="keyboard-row" style="margin-left: 2em;">
        <button><div>Й</div><div>J</div><div>Й</div></button>
        <button><div>Ц</div><div>C</div><div>Ц</div></button>
        <button><div>У</div><div>U</div><div>У</div></button>
        <button><div>К</div><div>K</div><div>К</div></button>
        <button><div>Е</div><div>E</div><div>Е</div></button>
        <button><div>Н</div><div>N</div><div>Н</div></button>
        <button><div>Г</div><div>G</div><div>Г</div></button>
        <button><div>Ш</div><div>[</div><div>Ш</div></button>
        <button><div>Щ</div><div>]</div><div>Щ</div></button>
        <button><div>З</div><div>Z</div><div>З</div></button>
        <button><div>Х</div><div>H</div><div>Х</div></button>
        <button><div>*</div><div>:</div><div>*</div></button>
        <button><div>BK</div><div>&nbsp;</div><div>BK</div></button>
      </div>
      <div class="keyboard-row">
        <button><div>СС</div><div>&nbsp;</div><div>CTRL</div></button>
        <button><div>Ф</div><div>F</div><div>F</div></button>
        <button><div>Ы</div><div>Y</div><div>Y</div></button>
        <button><div>В</div><div>W</div><div>W</div></button>
        <button><div>А</div><div>A</div><div>A</div></button>
        <button><div>П</div><div>P</div><div>P</div></button>
        <button><div>Р</div><div>R</div><div>R</div></button>
        <button><div>О</div><div>O</div><div>O</div></button>
        <button><div>Л</div><div>L</div><div>L</div></button>
        <button><div>Д</div><div>D</div><div>D</div></button>
        <button><div>Ж</div><div>V</div><div>V</div></button>
        <button><div>Э</div><div>\</div><div>\</div></button>
        <button><div>></div><div>.</div><div>.</div></button>
        <button><div>ПС</div><div>&nbsp;</div><div>DEL</div></button>
      </div>
      <div class="keyboard-row" style="margin-left: 2em;">
        <button><div>УС</div><div>&nbsp;</div><div>⇧</div></button>
        <button><div>Я</div><div>Q</div><div>Q</div></button>
        <button><div>Ч</div><div>^</div><div>`</div></button>
        <button><div>С</div><div>S</div><div>S</div></button>
        <button><div>М</div><div>M</div><div>M</div></button>
        <button><div>И</div><div>I</div><div>I</div></button>
        <button><div>Т</div><div>T</div><div>T</div></button>
        <button><div>Ь</div><div>X</div><div>X</div></button>
        <button><div>Б</div><div>B</div><div>B</div></button>
        <button><div>Ю</div><div>@</div><div>F7</div></button>
        <button><div>&lt;</div><div>,</div><div>,</div></button>
        <button><div>?</div><div>/</div><div>/</div></button>
        <button><div>РУС</div><div>ЛАТ</div><div>F10</div></button>
      </div>
    </div>
    <div class="keyboard-pad">
        <button><div>↖︎</div><div>&nbsp;</div><div>HOME</div></button>
        <button><div>Ф1</div><div>&nbsp;</div><div>F1</div></button>
        <button><div>СТР</div><div>&nbsp;</div><div>END</div></button>
        <button><div>←</div><div>&nbsp;</div><div>←</div></button>
        <button><div>↑</div><div>&nbsp;</div><div>↑</div></button>
        <button><div>→</div><div>&nbsp;</div><div>→</div></button>
        <button><div>Ф2</div><div>&nbsp;</div><div>F2</div></button>
        <button><div>Ф3</div><div>&nbsp;</div><div>F3</div></button>
        <button><div>Ф3</div><div>&nbsp;</div><div>F4</div></button>
        <button style="width: 6em; grid-column: span 2;"><div>↓</div><div>&nbsp;</div><div>↓</div></button>
        <button><div>AP2</div><div>&nbsp;</div><div>F5</div></button>
    </div>
  </div>
</body>
</html>
